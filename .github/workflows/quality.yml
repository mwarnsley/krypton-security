name: Repository quality

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  javascript:
    name: JavaScript and TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Check formatting
        run: npm run format:check
      - name: Lint source
        run: npm run lint
      - name: Type-check core
        run: npx tsc --noEmit
      - name: Type-check dashboard
        run: npx tsc --noEmit --project src/dashboard/tsconfig.json
      - name: Run tests
        run: npm run test

  rust:
    name: Native Rust core
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install Rust quality components
        run: rustup component add clippy rustfmt
      - name: Check formatting
        run: cargo fmt --manifest-path src/core-native/Cargo.toml --check
      - name: Lint native core
        run: cargo clippy --manifest-path src/core-native/Cargo.toml --all-targets --all-features -- -D warnings
      - name: Test native core
        run: cargo test --manifest-path src/core-native/Cargo.toml
